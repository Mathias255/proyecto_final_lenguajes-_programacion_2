<div class="login-wrapper">
  <div class="login-box">
    <h2>CREAR CUENTA</h2>
    <p class="subtitle">Únete a la comunidad gamer</p>
    
    <div *ngIf="errorMessage" class="alert">{{ errorMessage }}</div>

    <form (ngSubmit)="onRegister()">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="usuario.nombre" name="nombre" placeholder="Tu nombre" required>
      </div>

      <div class="input-group">
        <label>Apellido</label>
        <input type="text" [(ngModel)]="usuario.apellido" name="apellido" placeholder="Tu apellido" required>
      </div>

      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="usuario.email" name="email" placeholder="ejemplo@tienda.com" required>
      </div>
      
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="usuario.password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Registrarme 🚀</button>
    </form>

    <a routerLink="/login" class="back-btn">¿Ya tienes cuenta? Inicia sesión</a>
  </div>
</div>
