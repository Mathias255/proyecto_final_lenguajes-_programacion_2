<app-navbar></app-navbar>

<div class="detalle-container" *ngIf="producto">
  <div class="detalle-card">
    <div class="img-box">
      <img [src]="producto.imagenUrl || 'https://via.placeholder.com/400'" [alt]="producto.nombre">
    </div>
    <div class="info-box">
      <span class="category-tag">{{ producto.categoria?.nombre }}</span>
      <h1>{{ producto.nombre }}</h1>
      <p class="description">{{ producto.descripcion }}</p>
      
      <div class="price-row">
        <span class="price">${{ producto.precio }}</span>
        <span class="stock" [class.low-stock]="producto.stock < 5">Stock disponible: {{ producto.stock }}</span>
      </div>

      <button *ngIf="!esAdmin()" class="btn-buy" (click)="agregarAlCarrito()">Añadir al Carrito 🛒</button>
      <button routerLink="/catalogo" class="btn-back">Volver al Catálogo</button>
    </div>
  </div>
</div>

<div class="loading" *ngIf="!producto">
  <p>Cargando producto...</p>
</div>

<app-footer></app-footer>
