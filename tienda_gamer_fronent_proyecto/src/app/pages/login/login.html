<div class="login-wrapper">
  <div class="login-box">
    <h2>ACCESO AL SISTEMA</h2>
    <p class="subtitle">Ingresa tus datos para continuar</p>
    
    <div *ngIf="errorMessage" class="alert">{{ errorMessage }}</div>

    <form (ngSubmit)="onLogin()">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="credenciales.email" name="email" placeholder="ejemplo@tienda.com" required>
      </div>
      
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="credenciales.password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit" [disabled]="cargando">
        {{ cargando ? 'Verificando...' : 'Ingresar ⚡' }}
      </button>
    </form>

    <div class="social-login">
      <button type="button" class="btn-social">Google</button>
      <button type="button" class="btn-social">Discord</button>
    </div>

    <div class="register-section">
      <p>¿No tienes cuenta?</p>
      <button type="button" class="btn-register" routerLink="/registro">Crear Cuenta Nueva 🎮</button>
    </div>
    
    <p class="hint">💡 Tip: usa <b>admin@tienda.com</b> con clave <b>admin123</b> para entrar como administrador.</p>
    <a routerLink="/catalogo" class="back-btn">Entrar como invitado</a>
  </div>
</div>
