<app-navbar></app-navbar>

<div class="carrito-container">
  <h2>🛒 Tu Carrito Gamer</h2>

  <div class="cart-layout" *ngIf="items().length > 0; else emptyCart">
    <div class="items-list">
      <div class="cart-item" *ngFor="let item of items()">
        <img [src]="item.imagenUrl || 'https://via.placeholder.com/100'" [alt]="item.nombre">
        <div class="item-info">
          <h4>{{ item.nombre }}</h4>
          <p class="category">{{ item.categoria.nombre }}</p>
          <span class="price-unit">${{ item.precio }} x unidad</span>
        </div>
        <div class="quantity-controls">
          <button (click)="disminuir(item.id, item.cantidad)">-</button>
          <span>{{ item.cantidad }}</span>
          <button (click)="aumentar(item.id, item.cantidad)">+</button>
        </div>
        <div class="subtotal">
          ${{ item.precio * item.cantidad }}
        </div>
        <button class="btn-remove" (click)="eliminar(item.id)">🗑️</button>
      </div>
    </div>

    <div class="cart-summary">
      <h3>Resumen del Pedido</h3>
      <div class="summary-row">
        <span>Subtotal:</span>
        <span>${{ total() }}</span>
      </div>
      <div class="summary-row">
        <span>Envío:</span>
        <span class="free">GRATIS</span>
      </div>
      <hr>
      <div class="summary-row total">
        <span>Total:</span>
        <span>${{ total() }}</span>
      </div>
      <button class="btn-checkout">Finalizar Compra ⚡</button>
      <button class="btn-clear" (click)="vaciar()">Vaciar Carrito</button>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="empty-state">
      <p>Tu carrito está vacío. ¡Ve al catálogo y equípate!</p>
      <button routerLink="/catalogo" class="btn-primary">Ver Catálogo</button>
    </div>
  </ng-template>
</div>

<app-footer></app-footer>
